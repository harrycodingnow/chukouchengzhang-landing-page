    <script>
      const toggle = document.querySelector(".menu-toggle");
      const nav = document.querySelector(".main-nav");
      const langSwitch = document.getElementById("langSwitch");
      const translatable = document.querySelectorAll("[data-zh][data-en]");

      toggle?.addEventListener("click", () => nav.classList.toggle("open"));

      function applyLanguage(lang) {
        const safeLang = lang === "en" ? "en" : "zh";
        document.body.dataset.lang = safeLang;
        document.documentElement.lang = safeLang === "zh" ? "zh-Hant" : "en";

        translatable.forEach((node) => {
          node.textContent = node.dataset[safeLang];
        });

        if (langSwitch) {
          langSwitch.textContent = safeLang === "zh" ? "English" : "中文";
          langSwitch.setAttribute(
            "aria-label",
            safeLang === "zh" ? "Switch to English" : "切換到中文"
          );
        }
      }

      const savedLang = localStorage.getItem("moneytalks_lang");
      applyLanguage(savedLang === "en" ? "en" : "zh");

      langSwitch?.addEventListener("click", () => {
        const nextLang = document.body.dataset.lang === "zh" ? "en" : "zh";
        applyLanguage(nextLang);
        localStorage.setItem("moneytalks_lang", nextLang);
      });
    </script>
  </body>
